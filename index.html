<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Park Su Hee Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <style>
    * { box-sizing: border-box; }

    :root {
      --bg: #efefef;
      --text: #2f2f31;
      --muted: #666;
      --line: #cfcfcf;
      --white: #ffffff;
      --accent: #5f63e8;
      --shadow: 0 10px 35px rgba(0,0,0,0.08);
    }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      overflow-x: hidden;
      min-height: 100%;
    }

    body {
      position: relative;
    }

    .page {
      min-height: 100vh;
      position: relative;
      padding: 28px 42px 40px;
      overflow: hidden;
    }

    .top-nav {
      width: fit-content;
      margin: 18px auto 0;
      display: flex;
      align-items: center;
      gap: 28px;
      padding: 10px 12px 10px 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255,255,255,0.28);
      backdrop-filter: blur(6px);
      position: relative;
      z-index: 10;
    }

    .brand-thumb {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      object-fit: cover;
      border: 1px solid #dadada;
      flex-shrink: 0;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 28px;
      font-size: 15px;
      color: #505050;
    }

    .nav-links a {
      color: inherit;
      text-decoration: none;
      transition: opacity .2s ease;
    }

    .nav-links a:hover { opacity: .65; }

    .contact-btn {
      border: none;
      background: #2f2f31;
      color: white;
      font-size: 15px;
      font-weight: 500;
      border-radius: 999px;
      padding: 16px 30px;
      cursor: pointer;
      transition: transform .2s ease, opacity .2s ease;
    }

    .contact-btn:hover {
      transform: translateY(-1px);
      opacity: .95;
    }

    .hero {
      min-height: calc(100vh - 90px);
      display: grid;
      grid-template-columns: 1fr minmax(300px, 342px) 1fr;
      align-items: center;
      justify-items: center;
      gap: 22px;
      max-width: 1220px;
      margin: 0 auto;
      position: relative;
      padding: 48px 0 80px;
    }

    .hero-left,
    .hero-right {
      width: 100%;
    }

    .eyebrow {
      font-family: 'Oswald', sans-serif;
      font-size: clamp(24px, 2.1vw, 38px);
      line-height: 1;
      letter-spacing: 0.02em;
      margin: 0 0 8px;
      text-transform: uppercase;
    }

    .display {
      font-family: 'Oswald', sans-serif;
      font-size: clamp(86px, 10vw, 148px);
      line-height: 0.88;
      letter-spacing: -0.03em;
      font-weight: 600;
      margin: 0;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .hero-left {
      text-align: left;
      padding-left: 24px;
      transform: translateX(22px);
    }

    .hero-right {
      text-align: left;
      transform: translateX(-14px);
    }

    .subcopy {
      margin-top: 18px;
      font-size: clamp(18px, 1.55vw, 22px);
      line-height: 1.45;
      color: #575757;
      max-width: 430px;
    }

    .hero-visual {
      position: relative;
      width: min(342px, 28vw);
      min-width: 300px;
      aspect-ratio: 0.78 / 1;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: var(--shadow);
      z-index: 2;
    }

    .hero-visual img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .floating-dot {
      position: absolute;
      width: 16px;
      height: 16px;
      background: var(--accent);
      border-radius: 50%;
      top: 22%;
      left: 7%;
      z-index: 1;
    }

    .hand-badge {
      position: absolute;
      left: 50%;
      bottom: 112px;
      transform: translateX(-245px);
      width: 130px;
      height: 130px;
      border-radius: 50%;
      background: var(--accent);
      display: grid;
      place-items: center;
      box-shadow: 0 14px 35px rgba(95, 99, 232, 0.35);
      z-index: 4;
    }

    .hand-icon {
      font-size: 48px;
      color: #fff;
      line-height: 1;
      transform: translateY(-2px);
      user-select: none;
    }

    .mini-toggle {
      position: absolute;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      width: 40px;
      height: 20px;
      border-radius: 999px;
      background: var(--accent);
      z-index: 4;
    }

    .mini-toggle::before {
      content: '';
      position: absolute;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #fff;
      left: 4px;
      top: 3px;
    }

    @media (max-width: 1200px) {
      .hero {
        grid-template-columns: 1fr 320px 1fr;
      }

      .display {
        font-size: clamp(74px, 9vw, 124px);
      }

      .hero-left { transform: translateX(0); }
      .hero-right { transform: translateX(0); }
      .hand-badge { transform: translateX(-210px); }
    }

    @media (max-width: 900px) {
      .page {
        padding: 20px 18px 36px;
      }

      .top-nav {
        gap: 16px;
        padding-right: 8px;
      }

      .nav-links {
        gap: 14px;
        font-size: 14px;
      }

      .contact-btn {
        padding: 13px 20px;
      }

      .hero {
        grid-template-columns: 1fr;
        gap: 26px;
        padding-top: 30px;
        padding-bottom: 100px;
      }

      .hero-left,
      .hero-right {
        text-align: center;
        padding-left: 0;
      }

      .hero-right {
        order: 3;
      }

      .hero-visual {
        order: 2;
        width: min(82vw, 360px);
      }

      .subcopy {
        margin: 16px auto 0;
      }

      .display {
        white-space: normal;
      }

      .hand-badge {
        width: 100px;
        height: 100px;
        left: 50%;
        bottom: 72px;
        transform: translateX(-150px);
      }

      .hand-icon {
        font-size: 38px;
      }

      .floating-dot {
        top: 15%;
        left: 10%;
      }
    }

    @media (max-width: 620px) {
      .top-nav {
        width: 100%;
        justify-content: space-between;
        gap: 10px;
        padding: 8px;
      }

      .nav-links {
        display: none;
      }

      .contact-btn {
        padding: 12px 18px;
        font-size: 14px;
      }

      .eyebrow {
        font-size: 22px;
      }

      .display {
        font-size: 72px;
      }

      .subcopy {
        font-size: 16px;
      }

      .hand-badge {
        transform: translateX(-120px);
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="floating-dot"></div>

    <nav class="top-nav">
      <img src="img3.jpg" alt="profile icon" class="brand-thumb" />
      <div class="nav-links">
        <a href="#">Home</a>
        <a href="#about">About</a>
        <a href="#projects">Projects</a>
        <a href="#blogs">Blogs</a>
      </div>
      <button class="contact-btn">Contact</button>
    </nav>

    <section class="hero">
      <div class="hero-left hero-copy">
        <p class="eyebrow">PARK SU HEE</p>
        <h1 class="display">CLASS</h1>
      </div>

      <div class="hero-visual hero-photo-wrap">
        <img src="img3.jpg" alt="Park Su Hee main photo" class="hero-photo" />
      </div>

      <div class="hero-right hero-copy">
        <h2 class="display">DESIGNER</h2>
        <p class="subcopy">By the end of the class, you can do at least one thing.</p>
      </div>
    </section>

    <div class="hand-badge" aria-hidden="true">
      <div class="hand-icon">🖐</div>
    </div>

    <div class="mini-toggle" aria-hidden="true"></div>
  </main>

  <script>
    gsap.set('.top-nav', { y: -30, opacity: 0 });
    gsap.set('.hero-left', { x: -70, opacity: 0 });
    gsap.set('.hero-right', { x: 70, opacity: 0 });
    gsap.set('.hero-photo-wrap', { y: 40, opacity: 0, scale: 0.96 });
    gsap.set('.hand-badge', { scale: 0, rotation: -18, opacity: 0 });
    gsap.set('.mini-toggle', { y: 14, opacity: 0 });
    gsap.set('.floating-dot', { scale: 0, opacity: 0 });

    const tl = gsap.timeline({ defaults: { ease: 'power3.out' } });

    tl.to('.top-nav', { y: 0, opacity: 1, duration: 0.75 })
      .to('.hero-left', { x: 0, opacity: 1, duration: 0.9 }, '-=0.2')
      .to('.hero-photo-wrap', { y: 0, opacity: 1, scale: 1, duration: 0.9 }, '-=0.55')
      .to('.hero-right', { x: 0, opacity: 1, duration: 0.9 }, '-=0.7')
      .to('.hand-badge', { scale: 1, rotation: 0, opacity: 1, duration: 0.6, ease: 'back.out(1.8)' }, '-=0.3')
      .to('.mini-toggle', { y: 0, opacity: 1, duration: 0.35 }, '-=0.2')
      .to('.floating-dot', { scale: 1, opacity: 1, duration: 0.4 }, '-=0.25');

    gsap.to('.floating-dot', {
      y: -14,
      duration: 1.8,
      ease: 'sine.inOut',
      repeat: -1,
      yoyo: true
    });

    gsap.to('.hand-badge', {
      y: -10,
      duration: 2.3,
      ease: 'sine.inOut',
      repeat: -1,
      yoyo: true
    });

    gsap.to('.hero-photo', {
      scale: 1.03,
      duration: 3.5,
      ease: 'sine.inOut',
      repeat: -1,
      yoyo: true,
      transformOrigin: 'center center'
    });
  </script>
</body>
</html>
