<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Park Su Hee Portfolio</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow-x: hidden;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background: #efefef;
      color: #2b2b31;
    }

    .page {
      position: relative;
      width: 100%;
      min-height: 100vh;
      overflow: hidden;
    }

    /* 상단 메뉴 */
    .top-nav {
      position: absolute;
      top: 26px;
      left: 50%;
      transform: translateX(-50%);
      width: 460px;
      height: 64px;
      background: #f5f5f5;
      border: 1px solid #d6d6d6;
      border-radius: 999px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 10px 8px 8px;
      z-index: 20;
      box-shadow: 0 1px 0 rgba(0,0,0,0.04);
    }

    .nav-left {
      display: flex;
      align-items: center;
      gap: 18px;
      flex: 1;
      min-width: 0;
    }

    .nav-logo {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      overflow: hidden;
      flex-shrink: 0;
      background: #ffffff;
      border: 1px solid #dcdcdc;
    }

    .nav-logo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 24px;
      white-space: nowrap;
    }

    .nav-links a {
      text-decoration: none;
      color: #666;
      font-size: 14px;
      font-weight: 500;
    }

    .nav-links a:hover {
      color: #222;
    }

    .nav-contact {
      width: 106px;
      height: 46px;
      border: none;
      border-radius: 999px;
      background: #2c2c31;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      flex-shrink: 0;
    }

    /* 좌측 파란 점 */
    .blue-dot {
      position: absolute;
      left: 120px;
      top: 170px;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #5963e8;
      z-index: 5;
    }

    /* 중앙 메인 이미지 카드 */
    .center-card {
      position: absolute;
      left: 50%;
      top: 250px;
      transform: translateX(-50%);
      width: 315px;
      height: 405px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.38);
      box-shadow: 0 12px 28px rgba(0,0,0,0.05);
      overflow: hidden;
      z-index: 4;
    }

    .center-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* 좌우 텍스트 영역 - 핵심: 수평 정렬 */
    .hero-text-wrap {
      position: absolute;
      left: 50%;
      top: 450px;
      transform: translateX(-50%);
      width: 1180px;
      max-width: calc(100% - 120px);
      display: flex;
      justify-content: space-between;
      align-items: center; /* 핵심 */
      z-index: 10;
      pointer-events: none;
    }

    .left-text,
    .right-text {
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .left-text {
      align-items: flex-start;
      width: 360px;
    }

    .right-text {
      align-items: flex-start;
      width: 420px;
    }

    .small-name {
      font-size: 34px;
      line-height: 1;
      letter-spacing: -0.03em;
      color: #2f3138;
      margin-bottom: 10px;
      font-weight: 500;
    }

    .big-left,
    .big-right {
      font-size: 150px;
      line-height: 0.88;
      letter-spacing: -0.06em;
      font-weight: 900;
      color: #2b2b31;
      margin: 0;
    }

    .right-desc {
      margin-top: 12px;
      font-size: 24px;
      line-height: 1.25;
      color: #3e434c;
      font-weight: 400;
      max-width: 360px;
    }

    /* 하단 플로팅 버튼 */
    .floating-button {
      position: absolute;
      left: 50%;
      top: 650px;
      transform: translateX(-50%);
      width: 118px;
      height: 118px;
      border-radius: 50%;
      border: none;
      background: #5963e8;
      color: #fff;
      font-size: 50px;
      cursor: pointer;
      box-shadow: 0 18px 32px rgba(89, 99, 232, 0.25);
      z-index: 12;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .floating-button:hover {
      transform: translateX(-50%) scale(1.03);
    }

    /* 반응형 */
    @media (max-width: 1400px) {
      .hero-text-wrap {
        width: 1040px;
      }

      .big-left,
      .big-right {
        font-size: 128px;
      }

      .small-name {
        font-size: 30px;
      }

      .right-desc {
        font-size: 22px;
      }
    }

    @media (max-width: 1100px) {
      .top-nav {
        width: 420px;
      }

      .nav-links {
        gap: 18px;
      }

      .hero-text-wrap {
        width: 92%;
        top: 470px;
      }

      .left-text {
        width: 300px;
      }

      .right-text {
        width: 340px;
      }

      .big-left,
      .big-right {
        font-size: 96px;
      }

      .small-name {
        font-size: 24px;
      }

      .right-desc {
        font-size: 19px;
        max-width: 300px;
      }

      .center-card {
        width: 280px;
        height: 360px;
      }

      .floating-button {
        top: 640px;
        width: 104px;
        height: 104px;
        font-size: 44px;
      }
    }

    @media (max-width: 820px) {
      .top-nav {
        width: calc(100% - 32px);
        max-width: 460px;
        height: 60px;
      }

      .nav-links {
        gap: 14px;
      }

      .nav-links a {
        font-size: 13px;
      }

      .nav-contact {
        width: 92px;
        height: 42px;
        font-size: 13px;
      }

      .blue-dot {
        left: 34px;
        top: 145px;
        width: 12px;
        height: 12px;
      }

      .center-card {
        top: 220px;
        width: 240px;
        height: 320px;
      }

      .hero-text-wrap {
        position: absolute;
        top: 575px;
        left: 50%;
        transform: translateX(-50%);
        width: calc(100% - 36px);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
        text-align: center;
      }

      .left-text,
      .right-text {
        width: 100%;
        align-items: center;
      }

      .big-left,
      .big-right {
        font-size: 68px;
      }

      .small-name {
        font-size: 20px;
        margin-bottom: 8px;
      }

      .right-desc {
        font-size: 17px;
        max-width: 320px;
      }

      .floating-button {
        top: 860px;
        width: 92px;
        height: 92px;
        font-size: 38px;
      }

      .page {
        min-height: 980px;
      }
    }

    @media (max-width: 560px) {
      .nav-links {
        gap: 10px;
      }

      .nav-links a {
        font-size: 12px;
      }

      .nav-contact {
        width: 82px;
      }

      .big-left,
      .big-right {
        font-size: 56px;
      }

      .right-desc {
        font-size: 15px;
      }

      .small-name {
        font-size: 18px;
      }

      .center-card {
        width: 210px;
        height: 280px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="top-nav">
      <div class="nav-left">
        <div class="nav-logo">
          <img src="./img5.png" alt="profile icon" />
        </div>

        <nav class="nav-links">
          <a href="#">Home</a>
          <a href="#">About</a>
          <a href="#">Projects</a>
          <a href="#">Blogs</a>
        </nav>
      </div>

      <button class="nav-contact">Contact</button>
    </header>

    <div class="blue-dot"></div>

    <div class="center-card">
      <img src="./img6.png" alt="Park Su Hee main photo" />
    </div>

    <section class="hero-text-wrap">
      <div class="left-text">
        <div class="small-name">PARK SU HEE</div>
        <h1 class="big-left">CLASS</h1>
      </div>

      <div class="right-text">
        <h1 class="big-right">DESIGNER</h1>
        <p class="right-desc">
          By the end of the class, you can do at least one thing.
        </p>
      </div>
    </section>

    <button class="floating-button" aria-label="wave button">👋</button>
  </div>

  <script>
    gsap.from(".top-nav", {
      y: -18,
      opacity: 0,
      duration: 0.8,
      ease: "power2.out"
    });

    gsap.from(".blue-dot", {
      scale: 0,
      opacity: 0,
      duration: 0.5,
      delay: 0.2,
      ease: "back.out(2)"
    });

    gsap.from(".center-card", {
      y: 30,
      opacity: 0,
      duration: 1,
      delay: 0.2,
      ease: "power3.out"
    });

    gsap.from(".left-text", {
      x: -40,
      opacity: 0,
      duration: 0.9,
      delay: 0.35,
      ease: "power3.out"
    });

    gsap.from(".right-text", {
      x: 40,
      opacity: 0,
      duration: 0.9,
      delay: 0.35,
      ease: "power3.out"
    });

    gsap.from(".floating-button", {
      y: 30,
      opacity: 0,
      duration: 0.8,
      delay: 0.6,
      ease: "power3.out"
    });

    gsap.to(".floating-button", {
      y: -8,
      duration: 1.6,
      repeat: -1,
      yoyo: true,
      ease: "sine.inOut"
    });
  </script>
</body>
</html>
